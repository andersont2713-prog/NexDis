# Railway: https://docs.railway.app/deploy/config-as-code
# Root Directory en el dashboard = carpeta de este archivo (p. ej. NexDis).
# Dockerfile evita fallos de Railpack al crear el plan de build.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "NODE_ENV=production npm start"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
